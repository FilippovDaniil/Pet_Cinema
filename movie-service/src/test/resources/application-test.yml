spring:
  datasource:
    url: jdbc:tc:postgresql:15:///movie_db_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: create-drop
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
  data:
    redis:
      host: localhost
      port: 6379
eureka:
  client:
    enabled: false
jwt:
  secret: testSecretKeyForTestingPurposesOnly1234567890123456
redis:
  movies-cache-key: movies:list:all
  movies-cache-ttl: 600
  sessions-cache-prefix: "sessions:movie:"
  sessions-cache-ttl: 300
