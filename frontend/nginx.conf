# nginx.conf — конфигурация Nginx для раздачи React SPA в Docker-контейнере.
# Nginx заменяет Vite dev-server в production: раздаёт статические файлы из /dist.

server {
    # listen 80 — Nginx слушает на порту 80 (HTTP).
    # Docker-compose маппит хостовый порт 80 → контейнерный 80.
    listen 80;

    # root — директория со статическими файлами React-приложения.
    # Vite собирает проект в /app/dist (в Dockerfile), который копируется сюда.
    root /usr/share/nginx/html;

    # index — файл по умолчанию. Для React SPA всегда index.html.
    index index.html;

    # location / — обработка ВСЕХ запросов к статике (JS, CSS, HTML, изображения).
    location / {
        # try_files — ключевая директива для SPA-роутинга.
        # Порядок: сначала ищем файл ($uri), потом директорию ($uri/),
        # если ничего нет — отдаём index.html.
        # Это позволяет React Router работать при прямом переходе на /movies/1:
        # браузер запрашивает /movies/1 → nginx не найдёт файл → отдаст index.html
        # → React Router обработает /movies/1 на стороне клиента.
        try_files $uri $uri/ /index.html;
    }

    # location /api/ — проксирование API-запросов к api-gateway.
    # React-приложение обращается к /api/*, nginx переадресует на api-gateway:8080.
    # В dev-режиме это делает Vite proxy (vite.config.ts); здесь — Nginx в Docker.
    location /api/ {
        # proxy_pass — адрес api-gateway внутри Docker-сети.
        # api-gateway — имя сервиса в docker-compose.yml (Docker DNS резолвит автоматически).
        # Порт 8080 — порт Spring Cloud Gateway.
        proxy_pass http://api-gateway:8080/api/;

        # proxy_set_header Host — передаём оригинальный Host клиента на бэкенд.
        # $host — переменная Nginx: содержит Host из заголовка запроса клиента.
        proxy_set_header Host $host;

        # X-Real-IP — передаём реальный IP клиента (иначе бэкенд видит IP Nginx).
        # $remote_addr — IP адрес подключившегося клиента.
        proxy_set_header X-Real-IP $remote_addr;
    }
}
